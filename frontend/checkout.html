<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Romavision</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-section {
      padding: 40px 20px;
    }
    .checkout-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }
    .checkout-form {
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .checkout-form h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
      font-size: 20px;
    }
    .order-summary {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      height: fit-content;
    }
    .order-summary h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
      font-size: 20px;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .summary-row.total {
      font-weight: bold;
      font-size: 20px;
      color: #f0a500;
      border-top: 2px solid #ddd;
      padding-top: 15px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">⚡ Romavision</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
      <li id="auth-link"><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- Checkout Section -->
  <div class="checkout-section">
    <div class="container">
      <h2 style="margin-bottom:30px; color:#1a1a2e;">Checkout</h2>
      <div id="alert" class="alert" style="display:none;"></div>
      <div class="checkout-grid">

        <!-- Shipping Form -->
        <div class="checkout-form">
          <h3>📦 Shipping Address</h3>
          <div class="form-group">
            <label>Street Address</label>
            <input type="text" id="street" placeholder="Enter street address">
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="city" placeholder="Enter city">
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" id="state" placeholder="Enter state">
          </div>
          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="pincode" placeholder="Enter pincode">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number">
          </div>

          <button class="btn btn-primary" style="width:100%;" onclick="placeOrder()">
            💳 Place Order & Pay
          </button>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
          <h3>🛒 Order Summary</h3>
          <div id="order-items"></div>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>₹100</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2024 Romavision. All rights reserved.</p>
  </footer>

  <!-- Razorpay Script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Load Order Summary
    const loadOrderSummary = () => {
      const cart = getCart();
      if (cart.length === 0) {
        window.location.href = 'cart.html';
        return;
      }

      const subtotal = cart.reduce((total, item) =>
        total + (item.price * item.quantity), 0);
      const total = subtotal + 100;

      document.getElementById('subtotal').textContent = formatPrice(subtotal);
      document.getElementById('total').textContent = formatPrice(total);

      document.getElementById('order-items').innerHTML = cart.map(item => `
        <div class="summary-item">
          <span>${item.name} x${item.quantity}</span>
          <span>${formatPrice(item.price * item.quantity)}</span>
        </div>
      `).join('');
    };

    // Place Order
    const placeOrder = async () => {
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      const street = document.getElementById('street').value;
      const city = document.getElementById('city').value;
      const state = document.getElementById('state').value;
      const pincode = document.getElementById('pincode').value;
      const phone = document.getElementById('phone').value;

      if (!street || !city || !state || !pincode || !phone) {
        showAlert('Please fill in all fields!', 'error');
        return;
      }

      const cart = getCart();
      const subtotal = cart.reduce((total, item) =>
        total + (item.price * item.quantity), 0);
      const totalAmount = subtotal + 100;

      const items = cart.map(item => ({
        product: item._id,
        name: item.name,
        image: item.images?.[0] || '',
        price: item.price,
        quantity: item.quantity
      }));

      try {
        // Create Order in Database
        const orderResponse = await authFetch(`${API_URL}/orders`, {
          method: 'POST',
          body: JSON.stringify({
            items,
            shippingAddress: { street, city, state, pincode, phone },
            totalAmount
          })
        });

        const order = await orderResponse.json();

        // Create Razorpay Payment
        const paymentResponse = await authFetch(`${API_URL}/payment/create-order`, {
          method: 'POST',
          body: JSON.stringify({ amount: totalAmount })
        });

        const paymentOrder = await paymentResponse.json();

        // Open Razorpay Checkout
        const options = {
          key: 'rzp_test_1234567890abcd',
          amount: paymentOrder.amount,
          currency: 'INR',
          name: 'Romavision',
          description: 'Electric Lighting Products',
          order_id: paymentOrder.id,
          handler: async (response) => {
            // Verify Payment
            await authFetch(`${API_URL}/payment/verify`, {
              method: 'POST',
              body: JSON.stringify({
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature,
                orderId: order._id
              })
            });

            // Clear Cart
            saveCart([]);
            showAlert('Order placed successfully!', 'success');
            setTimeout(() => {
              window.location.href = 'orders.html';
            }, 1500);
          },
          prefill: {
            name: getUser()?.name,
            email: getUser()?.email,
            contact: phone
          },
          theme: { color: '#f0a500' }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (error) {
        showAlert('Something went wrong!', 'error');
        console.error(error);
      }
    };

    // Update Auth Link
    const updateAuthLink = () => {
      const authLink = document.getElementById('auth-link');
      if (isLoggedIn()) {
        const user = getUser();
        authLink.innerHTML = `<a href="#" onclick="logout()">Logout (${user.name})</a>`;
      }
    };

    loadOrderSummary();
    updateAuthLink();
  </script>

</body>
</html>
