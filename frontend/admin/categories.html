<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Categories - Romavision</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #1a1a2e;
      padding: 20px;
      color: white;
    }
    .sidebar .logo {
      font-size: 22px;
      font-weight: bold;
      color: #f0a500;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .sidebar ul { list-style: none; }
    .sidebar ul li { margin-bottom: 5px; }
    .sidebar ul li a {
      display: block;
      padding: 12px 15px;
      color: #ccc;
      border-radius: 5px;
      transition: all 0.3s;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: #f0a500;
      color: white;
    }
    .main-content {
      padding: 30px;
      background: #f5f5f5;
    }
    .main-content h2 {
      margin-bottom: 30px;
      color: #1a1a2e;
    }
    .add-form {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    .add-form h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    .categories-table {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .categories-table h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    table { width: 100%; border-collapse: collapse; }
    table th {
      background: #1a1a2e;
      color: white;
      padding: 12px;
      text-align: left;
    }
    table td { padding: 12px; border-bottom: 1px solid #eee; }
    table tr:hover { background: #f9f9f9; }

    /* Hamburger Button */
    .hamburger {
      display: none;
      font-size: 18px;
      cursor: pointer;
      background: #1a1a2e;
      color: #f0a500;
      border: none;
      padding: 15px 20px;
      width: 100%;
      text-align: left;
      font-weight: bold;
    }

    @media(max-width: 768px) {
      .hamburger { display: block; }
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: block; }
    }
  </style>
</head>
<body>

  <!-- Hamburger Button (Mobile) -->
  <button class="hamburger" onclick="toggleSidebar()">☰ Admin Menu</button>

  <div class="admin-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="logo">⚡ Romavision Admin</div>
      <ul>
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="products.html">📦 Products</a></li>
        <li><a href="categories.html" class="active">🗂️ Categories</a></li>
        <li><a href="orders.html">🛒 Orders</a></li>
        <li><a href="../index.html">🌐 View Website</a></li>
        <li><a href="#" onclick="logout()">🚪 Logout</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h2>🗂️ Manage Categories</h2>
      <div id="alert" class="alert" style="display:none;"></div>

      <!-- Add Category Form -->
      <div class="add-form">
        <h3>➕ Add New Category</h3>
        <div class="form-group">
          <label>Category Name</label>
          <input type="text" id="name" placeholder="Enter category name">
        </div>
        <div class="form-group">
          <label>Slug (URL friendly name)</label>
          <input type="text" id="slug" placeholder="e.g. street-lights">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description" placeholder="Enter description">
        </div>
        <button class="btn btn-primary" onclick="addCategory()">
          ➕ Add Category
        </button>
      </div>

      <!-- Categories Table -->
      <div class="categories-table">
        <h3>📋 All Categories</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Slug</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="categories-tbody">
            <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    const toggleSidebar = () => {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    };

    const checkAdmin = () => {
      if (!isLoggedIn() || !isAdmin()) {
        window.location.href = '../login.html';
      }
    };

    const loadCategories = async () => {
      try {
        const response = await fetch(`${API_URL}/categories`);
        const categories = await response.json();
        const tbody = document.getElementById('categories-tbody');

        if (categories.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No categories yet</td></tr>';
          return;
        }

        tbody.innerHTML = categories.map(cat => `
          <tr>
            <td>${cat.name}</td>
            <td>${cat.slug}</td>
            <td>${cat.description || 'N/A'}</td>
            <td>
              <button class="btn btn-danger"
                onclick="deleteCategory('${cat._id}')">
                Delete
              </button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    };

    const addCategory = async () => {
      const name = document.getElementById('name').value;
      const slug = document.getElementById('slug').value;
      const description = document.getElementById('description').value;

      if (!name || !slug) {
        showAlert('Please fill in name and slug!', 'error');
        return;
      }

      try {
        const response = await authFetch(`${API_URL}/categories`, {
          method: 'POST',
          body: JSON.stringify({ name, slug, description })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Category added successfully!', 'success');
          document.getElementById('name').value = '';
          document.getElementById('slug').value = '';
          document.getElementById('description').value = '';
          loadCategories();
        } else {
          showAlert(data.message, 'error');
        }
      } catch (error) {
        showAlert('Something went wrong!', 'error');
      }
    };

    const deleteCategory = async (categoryId) => {
      if (!confirm('Are you sure you want to delete this category?')) return;

      try {
        const response = await authFetch(`${API_URL}/categories/${categoryId}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showAlert('Category deleted successfully!', 'success');
          loadCategories();
        }
      } catch (error) {
        showAlert('Something went wrong!', 'error');
      }
    };

    checkAdmin();
    loadCategories();
  </script>

</body>
</html>
