<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - Romavision</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .orders-section {
      padding: 40px 20px;
    }
    .order-card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
      gap: 10px;
    }
    .order-header h3 {
      color: #1a1a2e;
      font-size: 16px;
    }
    .badge {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }
    .badge-processing { background: #fff3cd; color: #856404; }
    .badge-shipped { background: #cce5ff; color: #004085; }
    .badge-delivered { background: #d4edda; color: #155724; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }
    .badge-paid { background: #d4edda; color: #155724; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-failed { background: #f8d7da; color: #721c24; }
    .order-item {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 10px;
    }
    .order-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
    }
    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    .order-total {
      font-size: 18px;
      font-weight: bold;
      color: #f0a500;
    }
    .empty-orders {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .empty-orders .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">⚡ Romavision</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
      <li id="auth-link"><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- Orders Section -->
  <div class="orders-section">
    <div class="container">
      <h2 style="margin-bottom:30px; color:#1a1a2e;">📦 My Orders</h2>
      <div id="alert" class="alert" style="display:none;"></div>
      <div id="orders-container">
        <p style="text-align:center;">Loading orders...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2024 Romavision. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Load Orders
    const loadOrders = async () => {
      if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await authFetch(`${API_URL}/orders/myorders`);
        const orders = await response.json();
        const container = document.getElementById('orders-container');

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-orders">
              <div class="icon">📦</div>
              <h2>No orders yet!</h2>
              <p style="margin:15px 0;">You haven't placed any orders yet</p>
              <a href="products.html" class="btn btn-primary">Shop Now</a>
            </div>
          `;
          return;
        }

        container.innerHTML = orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <h3>Order ID: ${order._id}</h3>
                <p style="color:#888; font-size:13px; margin-top:5px;">
                  ${new Date(order.createdAt).toLocaleDateString('en-IN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                  })}
                </p>
              </div>
              <div style="display:flex; gap:10px;">
                <span class="badge badge-${order.deliveryStatus}">
                  ${order.deliveryStatus.toUpperCase()}
                </span>
                <span class="badge badge-${order.paymentStatus}">
                  ${order.paymentStatus.toUpperCase()}
                </span>
              </div>
            </div>

            ${order.items.map(item => `
              <div class="order-item">
                <img src="${item.image || 'https://via.placeholder.com/60'}" 
                     alt="${item.name}">
                <div>
                  <h4>${item.name}</h4>
                  <p style="color:#888;">
                    ${formatPrice(item.price)} x ${item.quantity}
                  </p>
                </div>
              </div>
            `).join('')}

            <div class="order-footer">
              <div>
                <p style="color:#888; font-size:14px;">
                  Shipping to: ${order.shippingAddress?.city}, 
                  ${order.shippingAddress?.state}
                </p>
              </div>
              <div class="order-total">
                Total: ${formatPrice(order.totalAmount)}
              </div>
            </div>
          </div>
        `).join('');

      } catch (error) {
        console.error('Error loading orders:', error);
      }
    };

    // Update Auth Link
    const updateAuthLink = () => {
      const authLink = document.getElementById('auth-link');
      if (isLoggedIn()) {
        const user = getUser();
        authLink.innerHTML = `<a href="#" onclick="logout()">Logout (${user.name})</a>`;
      }
    };

    loadOrders();
    updateAuthLink();
  </script>

</body>
</html>
