<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Romavision</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">⚡ Romavision</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
    </ul>
  </nav>

  <!-- Login Form -->
  <div class="form-container">
    <h2>Login to Romavision</h2>
    <div id="alert" class="alert" style="display:none;"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="loginUser()">
      Login
    </button>

    <p style="text-align:center; margin-top:20px;">
      Don't have an account? <a href="register.html" style="color:#f0a500;">Register here</a>
    </p>
  </div>

  <script src="js/main.js"></script>
  <script>
    const loginUser = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields!', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          saveAuth(data, data.token);
          showAlert('Login successful!', 'success');

          // Redirect based on role
          setTimeout(() => {
            if (data.role === 'admin') {
              window.location.href = 'admin/dashboard.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1000);
        } else {
          showAlert(data.message, 'error');
        }

      } catch (error) {
        showAlert('Something went wrong!', 'error');
      }
    };
  </script>

</body>
</html>
