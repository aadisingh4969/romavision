<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Romavision</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #1a1a2e;
      padding: 20px;
      color: white;
    }
    .sidebar .logo {
      font-size: 22px;
      font-weight: bold;
      color: #f0a500;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .sidebar ul {
      list-style: none;
    }
    .sidebar ul li {
      margin-bottom: 5px;
    }
    .sidebar ul li a {
      display: block;
      padding: 12px 15px;
      color: #ccc;
      border-radius: 5px;
      transition: all 0.3s;
      font-size: 15px;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: #f0a500;
      color: white;
    }
    .main-content {
      padding: 30px;
      background: #f5f5f5;
    }
    .main-content h2 {
      margin-bottom: 30px;
      color: #1a1a2e;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    .stat-card .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: bold;
      color: #f0a500;
    }
    .stat-card .label {
      color: #888;
      font-size: 14px;
      margin-top: 5px;
    }
    .recent-orders {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .recent-orders h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table th {
      background: #1a1a2e;
      color: white;
      padding: 12px;
      text-align: left;
    }
    table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    table tr:hover { background: #f9f9f9; }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-processing { background: #fff3cd; color: #856404; }
    .badge-shipped { background: #cce5ff; color: #004085; }
    .badge-delivered { background: #d4edda; color: #155724; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }

    @media(max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div class="admin-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">⚡ Romavision Admin</div>
      <ul>
        <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
        <li><a href="products.html">📦 Products</a></li>
        <li><a href="categories.html">🗂️ Categories</a></li>
        <li><a href="orders.html">🛒 Orders</a></li>
        <li><a href="../index.html">🌐 View Website</a></li>
        <li><a href="#" onclick="logout()">🚪 Logout</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h2>📊 Dashboard</h2>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="icon">👥</div>
          <div class="number" id="total-users">0</div>
          <div class="label">Total Customers</div>
        </div>
        <div class="stat-card">
          <div class="icon">📦</div>
          <div class="number" id="total-products">0</div>
          <div class="label">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="icon">🛒</div>
          <div class="number" id="total-orders">0</div>
          <div class="label">Total Orders</div>
        </div>
        <div class="stat-card">
          <div class="icon">💰</div>
          <div class="number" id="total-revenue">₹0</div>
          <div class="label">Total Revenue</div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="recent-orders">
        <h3>🛒 Recent Orders</h3>
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="orders-table">
            <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // Check Admin Access
    const checkAdmin = () => {
      if (!isLoggedIn() || !isAdmin()) {
        window.location.href = '../login.html';
      }
    };

    // Load Stats
    const loadStats = async () => {
      try {
        const response = await authFetch(`${API_URL}/admin/stats`);
        const stats = await response.json();

        document.getElementById('total-users').textContent = stats.totalUsers;
        document.getElementById('total-products').textContent = stats.totalProducts;
        document.getElementById('total-orders').textContent = stats.totalOrders;
        document.getElementById('total-revenue').textContent = formatPrice(stats.totalRevenue);
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    };

    // Load Recent Orders
    const loadRecentOrders = async () => {
      try {
        const response = await authFetch(`${API_URL}/orders`);
        const orders = await response.json();
        const tbody = document.getElementById('orders-table');

        if (orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No orders yet</td></tr>';
          return;
        }

        tbody.innerHTML = orders.slice(0, 10).map(order => `
          <tr>
            <td style="font-size:12px;">${order._id.slice(-8)}</td>
            <td>${order.user?.name || 'N/A'}</td>
            <td>${formatPrice(order.totalAmount)}</td>
            <td>${order.paymentStatus}</td>
            <td>
              <span class="badge badge-${order.deliveryStatus}">
                ${order.deliveryStatus}
              </span>
            </td>
            <td>${new Date(order.createdAt).toLocaleDateString('en-IN')}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    };

    checkAdmin();
    loadStats();
    loadRecentOrders();
  </script>

</body>
</html>
