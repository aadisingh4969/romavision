<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Romavision</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-section {
      padding: 40px 20px;
    }
    .cart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }
    .cart-item {
      background: white;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }
    .cart-item-info { flex: 1; }
    .cart-item-info h3 { margin-bottom: 5px; }
    .cart-item-info .price {
      color: #f0a500;
      font-size: 18px;
      font-weight: bold;
    }
    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .quantity-controls button {
      width: 30px;
      height: 30px;
      border: none;
      background: #1a1a2e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .order-summary {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      height: fit-content;
    }
    .order-summary h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
      font-size: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .summary-row.total {
      font-weight: bold;
      font-size: 20px;
      color: #f0a500;
      border-top: 2px solid #ddd;
      padding-top: 15px;
    }
    .empty-cart {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .empty-cart .icon { font-size: 80px; margin-bottom: 20px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">⚡ Romavision</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
      <li id="auth-link"><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <!-- Cart Section -->
  <div class="cart-section">
    <div class="container">
      <h2 style="margin-bottom:30px; color:#1a1a2e;">🛒 Your Cart</h2>
      <div id="alert" class="alert" style="display:none;"></div>
      <div id="cart-container"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2024 Romavision. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Load Cart
    const loadCart = () => {
      const cart = getCart();
      const container = document.getElementById('cart-container');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🛒</div>
            <h2>Your cart is empty!</h2>
            <p style="margin:15px 0;">Add some products to your cart</p>
            <a href="products.html" class="btn btn-primary">Shop Now</a>
          </div>
        `;
        return;
      }

      const subtotal = cart.reduce((total, item) => 
        total + (item.price * item.quantity), 0);
      const shipping = 100;
      const total = subtotal + shipping;

      container.innerHTML = `
        <div class="cart-grid">
          <div id="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <img src="${item.images?.[0] || 'https://via.placeholder.com/100'}" 
                     alt="${item.name}">
                <div class="cart-item-info">
                  <h3>${item.name}</h3>
                  <div class="price">${formatPrice(item.price)}</div>
                  <div class="quantity-controls">
                    <button onclick="updateQuantity('${item._id}', -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQuantity('${item._id}', 1)">+</button>
                    <button onclick="removeItem('${item._id}')" 
                      style="background:#e74c3c; margin-left:10px; width:auto; padding:0 10px;">
                      Remove
                    </button>
                  </div>
                </div>
                <div style="font-weight:bold; font-size:18px;">
                  ${formatPrice(item.price * item.quantity)}
                </div>
              </div>
            `).join('')}
          </div>
          <div class="order-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>${formatPrice(shipping)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:20px;"
              onclick="proceedToCheckout()">
              Proceed to Checkout
            </button>
            <a href="products.html" 
              style="display:block; text-align:center; margin-top:15px; color:#888;">
              Continue Shopping
            </a>
          </div>
        </div>
      `;
    };

    // Update Quantity
    const updateQuantity = (productId, change) => {
      let cart = getCart();
      const item = cart.find(i => i._id === productId);
      if (item) {
        item.quantity += change;
        if (item.quantity <= 0) {
          cart = cart.filter(i => i._id !== productId);
        }
      }
      saveCart(cart);
      loadCart();
      updateCartCount();
    };

    // Remove Item
    const removeItem = (productId) => {
      let cart = getCart();
      cart = cart.filter(i => i._id !== productId);
      saveCart(cart);
      loadCart();
      updateCartCount();
    };

    // Proceed to Checkout
    const proceedToCheckout = () => {
      if (!isLoggedIn()) {
        showAlert('Please login to proceed!', 'error');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        return;
      }
      window.location.href = 'checkout.html';
    };

    // Update Auth Link
    const updateAuthLink = () => {
      const authLink = document.getElementById('auth-link');
      if (isLoggedIn()) {
        const user = getUser();
        authLink.innerHTML = `<a href="#" onclick="logout()">Logout (${user.name})</a>`;
      }
    };

    loadCart();
    updateAuthLink();
  </script>

</body>
</html>
