<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Orders - Romavision</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: #1a1a2e;
      padding: 20px;
      color: white;
    }
    .sidebar .logo {
      font-size: 22px;
      font-weight: bold;
      color: #f0a500;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .sidebar ul { list-style: none; }
    .sidebar ul li { margin-bottom: 5px; }
    .sidebar ul li a {
      display: block;
      padding: 12px 15px;
      color: #ccc;
      border-radius: 5px;
      transition: all 0.3s;
    }
    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background: #f0a500;
      color: white;
    }
    .main-content {
      padding: 30px;
      background: #f5f5f5;
    }
    .main-content h2 {
      margin-bottom: 30px;
      color: #1a1a2e;
    }
    .orders-table {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .orders-table h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    table { width: 100%; border-collapse: collapse; }
    table th {
      background: #1a1a2e;
      color: white;
      padding: 12px;
      text-align: left;
    }
    table td { padding: 12px; border-bottom: 1px solid #eee; }
    table tr:hover { background: #f9f9f9; }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-processing { background: #fff3cd; color: #856404; }
    .badge-shipped { background: #cce5ff; color: #004085; }
    .badge-delivered { background: #d4edda; color: #155724; }
    .badge-cancelled { background: #f8d7da; color: #721c24; }
    select.status-select {
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Hamburger Button */
    .hamburger {
      display: none;
      font-size: 18px;
      cursor: pointer;
      background: #1a1a2e;
      color: #f0a500;
      border: none;
      padding: 15px 20px;
      width: 100%;
      text-align: left;
      font-weight: bold;
    }

    @media(max-width: 768px) {
      .hamburger { display: block; }
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: block; }
    }
  </style>
</head>
<body>

  <!-- Hamburger Button (Mobile) -->
  <button class="hamburger" onclick="toggleSidebar()">☰ Admin Menu</button>

  <div class="admin-layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="logo">⚡ Romavision Admin</div>
      <ul>
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="products.html">📦 Products</a></li>
        <li><a href="categories.html">🗂️ Categories</a></li>
        <li><a href="orders.html" class="active">🛒 Orders</a></li>
        <li><a href="../index.html">🌐 View Website</a></li>
        <li><a href="#" onclick="logout()">🚪 Logout</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h2>🛒 Manage Orders</h2>
      <div id="alert" class="alert" style="display:none;"></div>

      <!-- Orders Table -->
      <div class="orders-table">
        <h3>📋 All Orders</h3>
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="8" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    const toggleSidebar = () => {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('open');
    };

    const checkAdmin = () => {
      if (!isLoggedIn() || !isAdmin()) {
        window.location.href = '../login.html';
      }
    };

    const loadOrders = async () => {
      try {
        const response = await authFetch(`${API_URL}/orders`);
        const orders = await response.json();
        const tbody = document.getElementById('orders-tbody');

        if (orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No orders yet</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(order => `
          <tr>
            <td style="font-size:12px;">${order._id.slice(-8)}</td>
            <td>${order.user?.name || 'N/A'}<br>
              <small style="color:#888;">${order.user?.email || ''}</small>
            </td>
            <td>${order.items.length} items</td>
            <td>${formatPrice(order.totalAmount)}</td>
            <td>
              <span class="badge badge-${order.paymentStatus}">
                ${order.paymentStatus}
              </span>
            </td>
            <td>
              <span class="badge badge-${order.deliveryStatus}">
                ${order.deliveryStatus}
              </span>
            </td>
            <td>${new Date(order.createdAt).toLocaleDateString('en-IN')}</td>
            <td>
              <select class="status-select" onchange="updateStatus('${order._id}', this.value)">
                <option value="processing" ${order.deliveryStatus === 'processing' ? 'selected' : ''}>Processing</option>
                <option value="shipped" ${order.deliveryStatus === 'shipped' ? 'selected' : ''}>Shipped</option>
                <option value="delivered" ${order.deliveryStatus === 'delivered' ? 'selected' : ''}>Delivered</option>
                <option value="cancelled" ${order.deliveryStatus === 'cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
      }
    };

    const updateStatus = async (orderId, status) => {
      try {
        const response = await authFetch(`${API_URL}/orders/${orderId}`, {
          method: 'PUT',
          body: JSON.stringify({ deliveryStatus: status })
        });

        if (response.ok) {
          showAlert('Order status updated!', 'success');
        }
      } catch (error) {
        showAlert('Something went wrong!', 'error');
      }
    };

    checkAdmin();
    loadOrders();
  </script>

</body>
</html>
